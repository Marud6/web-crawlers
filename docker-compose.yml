services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - rabbitmqkeydb_default
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  keydb:
    image: eqalpha/keydb
    container_name: keydb
    ports:
      - "6379:6379"
    volumes:
      - keydb_data:/data
    command: keydb-server /etc/keydb/keydb.conf --appendonly yes
    restart: unless-stopped
    networks:
      - rabbitmqkeydb_default
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build: orchestrator/docker-api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    environment:
      AMQP_URL: amqp://${RABBITMQ_USER:-user}:${RABBITMQ_PASS:-password}@rabbitmq:5672/
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    restart: unless-stopped
    stop_grace_period: 40s
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rabbitmqkeydb_default

  frontend:
    build: crawler-GUI
    ports:
      - "80:80"
    restart: unless-stopped

  crawler:
    build: ./crawler
    image: crawler-image
    environment:
      AMQP_URL: amqp://${RABBITMQ_USER:-user}:${RABBITMQ_PASS:-password}@rabbitmq:5672/
      REDIS_ADDR: keydb:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      keydb:
        condition: service_healthy
    networks:
      - rabbitmqkeydb_default

volumes:
  rabbitmq_data:
  keydb_data:

networks:
  rabbitmqkeydb_default:
    name: rabbitmqkeydb_default
